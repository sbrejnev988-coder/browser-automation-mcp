name: CI

on:
  push:
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: python -m pip install -r requirements.txt
      - name: Compile
        run: python -m py_compile server.py scripts/smoke_mcp.py scripts/make_release_export.py scripts/e2e_test.py
      - name: MCP smoke test
        env:
          BROWSER_AUTOSTART_CDP: '0'
        run: python scripts/smoke_mcp.py ./server.py
      - name: Clean export smoke test
        run: |
          python scripts/make_release_export.py --dst /tmp/browser-automation-mcp-export
          python /tmp/browser-automation-mcp-export/scripts/smoke_mcp.py /tmp/browser-automation-mcp-export/server.py

  browser-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: |
          python -m pip install -r requirements.txt
          sudo apt-get update -qq && sudo apt-get install -y -qq chromium-browser
      - name: Start test HTTP server
        run: |
          mkdir -p /tmp/browser-e2e-site
          echo '<html><head><title>Browser E2E</title></head><body><h1>E2E OK</h1></body></html>' > /tmp/browser-e2e-site/index.html
          python3 -m http.server 8765 --bind 127.0.0.1 --directory /tmp/browser-e2e-site > /tmp/browser-e2e-http.log 2>&1 &
          sleep 1
          curl -s http://127.0.0.1:8765/ | head -3
      - name: Start Chromium with CDP
        run: |
          PROFILE=$(mktemp -d)
          chromium-browser \
            --headless=new \
            --no-sandbox \
            --disable-dev-shm-usage \
            --disable-gpu \
            --remote-debugging-address=127.0.0.1 \
            --remote-debugging-port=9223 \
            --remote-allow-origins=* \
            --window-size=1280,720 \
            --user-data-dir="$PROFILE" \
            about:blank &
          for i in $(seq 1 30); do
            curl -s http://127.0.0.1:9223/json/version && break
            sleep 1
          done
          curl -s http://127.0.0.1:9223/json/version | python3 -m json.tool
      - name: Browser E2E test
        env:
          BROWSER_CDP_URL: http://127.0.0.1:9223
          BROWSER_AUTOSTART_CDP: '0'
          BROWSER_TIMEOUT: '15'
          BROWSER_ALLOWED_HOSTS: 127.0.0.1,localhost
          BROWSER_E2E_URL: http://127.0.0.1:8765/
        run: python3 scripts/e2e_test.py
      - name: Cleanup
        if: always()
        run: |
          pkill -f chromium || true
          pkill -f 'http.server' || true
